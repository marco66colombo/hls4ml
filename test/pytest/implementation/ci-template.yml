.pytest-implementation:
  extends: .pytest-base
  variables:
    IMPLEMENTATION_DATASET_DIR: "test/pytest/implementation"
  script:
    # Expose full Vivado only for implementation pipeline jobs.
    - echo '#!/bin/bash' > cmd_vivado_${VIVADO_VERSION}/vivado
    - echo "apptainer exec --cleanenv --env LANG=C,LC_ALL=C /cvmfs/projects.cern.ch/hls4ml/vivado/${VIVADO_VERSION} vivado \"\$@\"" >> cmd_vivado_${VIVADO_VERSION}/vivado
    - chmod +x cmd_vivado_${VIVADO_VERSION}/vivado

    - cd test/pytest
    - pytest $PYTESTFILE -rA --junitxml=report.xml --randomly-seed=42 --randomly-dont-reorganize --randomly-dont-reset-seed
  artifacts:
    when: always
    reports:
      junit:
        - test/pytest/report.xml
    paths:
      - test/pytest/*.tar.gz
      - test/pytest/synthesis_report_*.json
      - ${IMPLEMENTATION_DATASET_DIR}/implementation_dataset_*.json
