.implementation.test.keras_api_vivadoacc:
  variables:
    PYTESTFILE: implementation/test_keras_api_vivadoacc.py
    EXAMPLEMODEL: 0

pytest.implementation.keras_api_vivadoacc:
  extends:
    - .implementation.runtime.vivado-image
    - .implementation.test.keras_api_vivadoacc
  variables:
    VIVADO_VERSION: "2020.1"
    VITIS_VERSION: "2024.1"
