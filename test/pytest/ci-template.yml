.pytest:
  extends: .pytest-base
  script:
    # Load Intel oneAPI environment variables for oneAPI-related tests in the default matrix.
    - source /opt/intel/oneapi/setvars.sh --force

    - cd test/pytest
    - pytest $PYTESTFILE -rA --cov-report xml --cov-report term --cov=hls4ml --junitxml=report.xml --randomly-seed=42 --randomly-dont-reorganize --randomly-dont-reset-seed
  artifacts:
    when: always
    reports:
      junit:
        - test/pytest/report.xml
      coverage_report:
        coverage_format: cobertura
        path: test/pytest/coverage.xml
    paths:
      - test/pytest/*.tar.gz
      - test/pytest/synthesis_report_*.json

.pytest-keras3-only:
  extends: .pytest
  variables:
    CONDA_ENV: "hls4ml-testing-keras3"
    EXTRA_DEPS: "[da,testing,testing-keras3,sr]"
