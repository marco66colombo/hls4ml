.pytest-implementation-vivadoaccelerator:
  extends:
    - .pytest-implementation-vivado-runtime
  variables:
    VIVADO_VERSION: "2020.1"
    EXAMPLEMODEL: 1

pytest.implementation.keras_1layer_vivadoacc:
  extends:
    - .pytest-implementation-vivadoaccelerator
  variables:
    PYTESTFILE: implementation/test_vivadoaccelerator_implementation.py::test_keras_1layer

pytest.implementation.keras_conv1d_small_vivadoacc:
  extends:
    - .pytest-implementation-vivadoaccelerator
  variables:
    PYTESTFILE: implementation/test_vivadoaccelerator_implementation.py::test_keras_conv1d_small

.pytest-implementation-vitis-unified:
  extends:
    - .pytest-implementation-vitis-runtime
  variables:
    VIVADO_VERSION: "2023.2"
    VITIS_VERSION: "2023.2"
    XILINX_VITIS: "/tools/Xilinx/Vitis/2023.2"
    XILINX_VIVADO: "/tools/Xilinx/Vivado/2023.2"
    EXAMPLEMODEL: 1

pytest.implementation.keras_3layer_vitis_unified:
  extends:
    - .pytest-implementation-vitis-unified
  variables:
    PYTESTFILE: implementation/test_vitis_unified_implementation.py::test_keras_3layer

pytest.implementation.keras_conv1d_small_vitis_unified:
  extends:
    - .pytest-implementation-vitis-unified
  variables:
    PYTESTFILE: implementation/test_vitis_unified_implementation.py::test_keras_conv1d_small
